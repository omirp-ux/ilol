name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      # Python 3.10 — mais compatível com pyjnius/Kivy no Android
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      # Cython 0.29.x — Cython 3.x quebra o pyjnius
      - name: Instalar Buildozer
        run: |
          pip install --upgrade "cython==0.29.36" buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Aceitar licenças do Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf '\n33b6937684c63422b741b521fea99ca3bdc49e93\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iLoL-APK
          path: bin/*.apk
          retention-days: 30
