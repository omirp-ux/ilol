name: Build APK

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Configurar Java 17
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Instalar Buildozer
        run: |
          pip install --upgrade "cython==0.29.36" buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Aceitar licenças do Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf '\n33b6937684c63422b741b521fea99ca3bdc49e93\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      # Substitui o debug.keystore pelo nosso keystore persistente.
      # Builds debug sempre usam ~/.android/debug.keystore —
      # ao trocar esse arquivo pela nossa chave fixa, todo APK gerado
      # terá a mesma assinatura e o Android aceitará como atualização.
      - name: Instalar keystore persistente
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore
          echo "ANDROID_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ANDROID_KEYALIAS_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV

      - name: Configurar alias do keystore
        run: |
          sed -i "s/^android.keyalias.*/android.keyalias = ${{ secrets.KEY_ALIAS }}/" buildozer.spec

      # O version code sobe a cada build usando o número do run do GitHub.
      # O Android exige que atualizações tenham version code maior que o instalado.
      - name: Atualizar version code para build
        run: |
          # Extrair o version code atual e incrementar para este build
          CURRENT_VERSION=$(grep "^android.numeric_version" buildozer.spec | awk '{print $3}')
          BUILD_VERSION=$((CURRENT_VERSION + 1))
          
          # Atualizar temporariamente para o build
          sed -i "s/^android.numeric_version.*/android.numeric_version = $BUILD_VERSION/" buildozer.spec
          echo "Building with version code: $BUILD_VERSION"

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Atualizar version code no repositório
        if: success()
        run: |
          # Extrair o version code atual do spec
          CURRENT_VERSION=$(grep "^android.numeric_version" buildozer.spec | awk '{print $3}')
          
          # Commit e push com token de autenticação
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add buildozer.spec
          git commit -m "chore: bump version code to $CURRENT_VERSION [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iLoL-APK
          path: bin/*.apk
          retention-days: 30
