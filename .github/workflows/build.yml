name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Configurar Java 17
        run: |
          sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Instalar Buildozer
        run: |
          pip install --upgrade "cython==0.29.36" buildozer

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Aceitar licenças do Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          printf '\n33b6937684c63422b741b521fea99ca3bdc49e93\n' \
            > ~/.buildozer/android/platform/android-sdk/licenses/android-googletv-license

      # Valida e instala o keystore persistente.
      # Se KEYSTORE_B64 não estiver configurado nos secrets, o build FALHA aqui
      # com mensagem clara em vez de gerar um APK com chave aleatória
      # (que causaria conflito de assinatura na próxima instalação).
      - name: Instalar keystore persistente
        run: |
          if [ -z "${{ secrets.KEYSTORE_B64 }}" ]; then
            echo "::error::KEYSTORE_B64 nao esta configurado nos secrets do repositorio."
            echo "Acesse Settings -> Secrets -> Actions e adicione o secret KEYSTORE_B64."
            echo "Para gerar o keystore pela primeira vez, rode o workflow 'Gerar Keystore'."
            exit 1
          fi
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > ~/.android/debug.keystore
          TAMANHO=$(wc -c < ~/.android/debug.keystore)
          echo "Keystore instalado com sucesso ($TAMANHO bytes)."
          if [ "$TAMANHO" -lt 100 ]; then
            echo "::error::Keystore parece invalido (muito pequeno). Verifique o secret KEYSTORE_B64."
            exit 1
          fi

      - name: Atualizar version code
        run: |
          grep -q "^android.numeric_version" buildozer.spec \
            && sed -i "s/^android.numeric_version.*/android.numeric_version = ${{ github.run_number }}/" buildozer.spec \
            || echo "android.numeric_version = ${{ github.run_number }}" >> buildozer.spec

      - name: Build APK
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: iLoL-APK
          path: bin/*.apk
          retention-days: 30
