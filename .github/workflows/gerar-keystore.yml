name: Gerar Keystore (rodar uma vez)

on:
  workflow_dispatch:   # só roda quando você clicar manualmente

jobs:
  gerar:
    runs-on: ubuntu-22.04

    steps:
      - name: Configurar Java 17
        run: |
          sudo apt-get install -y openjdk-17-jdk
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Gerar keystore
        run: |
          keytool -genkey -v \
            -keystore ilol.keystore \
            -alias ilol \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ilol1234 \
            -keypass ilol1234 \
            -dname "CN=iLoL, OU=App, O=iLoL, L=BR, S=BR, C=BR"

      - name: Converter para base64
        run: |
          base64 ilol.keystore > ilol_keystore_base64.txt
          echo ""
          echo "=== CONTEUDO BASE64 (copie tudo abaixo) ==="
          cat ilol_keystore_base64.txt

      - name: Upload keystore base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64
          path: ilol_keystore_base64.txt
          retention-days: 1
